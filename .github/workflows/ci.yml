name: Continuous Integration

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  typescript:
    name: TypeScript CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run mutation tests
        if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'
        run: npx stryker run
        continue-on-error: true
      - name: Archive mutation report
        if: always() && (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
        uses: actions/upload-artifact@v4
        with:
          name: typescript-mutation-report
          path: ./typescript/reports/mutation/

  python:
    name: Python CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./python/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Run mutation tests
        if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'
        run: |
          mutmut run
          mutmut show > mutation-report.txt
        continue-on-error: true
      - name: Archive mutation report
        if: always() && (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
        uses: actions/upload-artifact@v4
        with:
          name: python-mutation-report
          path: ./python/mutation-report.txt

  java:
    name: Java CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./java
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        run: mvn test

  csharp:
    name: C# CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./csharp
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Run tests
        run: dotnet test --no-build --verbosity normal

  php:
    name: PHP CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./php
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run tests
        run: vendor/bin/phpunit
